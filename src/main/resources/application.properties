# ============================================
# Application Configuration
# ============================================
spring.application.name=order-service

# ============================================
# Server Configuration
# ============================================
server.port=8080

# ============================================
# H2 Database Configuration (Development)
# ============================================
# In-memory database - data is lost on application restart
# For production, use PostgreSQL with persistent storage
spring.datasource.url=jdbc:h2:mem:orderdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration
# Access at: http://localhost:8080/h2-console
# Use JDBC URL: jdbc:h2:mem:orderdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# JPA/Hibernate Configuration
# ============================================
# H2 dialect for development
# For production, use: org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# DDL Auto Configuration
# create-drop: Creates schema on startup, drops on shutdown (development only)
# For production, use: validate or none
spring.jpa.hibernate.ddl-auto=create-drop

# SQL Logging (Development)
# Shows SQL queries in console for debugging
# Disable in production for performance
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Logging Configuration
# ============================================
# Application logging level
logging.level.com.assignment.order_svc=DEBUG

# Spring framework logging
logging.level.org.springframework.web=INFO

# Hibernate SQL logging
logging.level.org.hibernate.SQL=DEBUG
